<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIMA — Prototype MVP</title>
  <style>
    :root{
      --bg:#f7f4ff;
      --surface:#ffffff;
      --surface-2:#f0ebff;
      --text:#201b2c;
      --muted:#756e82;
      --primary:#6f3ff5;
      --primary-dark:#4e22c9;
      --success:#2fb777;
      --warning:#f39a35;
      --danger:#e46672;
      --border:#e7e0f3;
      --shadow:0 18px 55px rgba(63,40,110,.12);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 0%, rgba(111,63,245,.12), transparent 28rem),
        radial-gradient(circle at 100% 20%, rgba(47,183,119,.08), transparent 24rem),
        var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    button,input,textarea{font:inherit}
    button{cursor:pointer}
    a{color:inherit;text-decoration:none}
    .hidden{display:none!important}
    .app{min-height:100vh}
    .container{width:min(1120px, calc(100% - 28px)); margin:0 auto}
    .topbar{
      position:sticky; top:0; z-index:20;
      backdrop-filter:blur(14px);
      background:rgba(247,244,255,.82);
      border-bottom:1px solid rgba(231,224,243,.75);
    }
    .topbar-inner{
      height:70px; display:flex; align-items:center; justify-content:space-between; gap:16px;
    }
    .brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:-.04em;font-size:1.3rem}
    .brand-mark{
      width:40px;height:40px;border-radius:14px;background:linear-gradient(145deg,var(--primary),#9d79ff);
      color:white;display:grid;place-items:center;box-shadow:0 10px 25px rgba(111,63,245,.3)
    }
    .demo-badge{
      padding:8px 12px;border-radius:999px;background:#fff;border:1px solid var(--border);
      color:var(--muted);font-size:.8rem;font-weight:700;
    }
    main{padding:28px 0 80px}
    .hero{padding:28px 0 14px}
    .hero-grid{display:grid;gap:22px}
    .hero h1{
      font-size:clamp(2.4rem,9vw,5rem);line-height:.95;letter-spacing:-.065em;margin:16px 0 18px;max-width:900px
    }
    .hero p{font-size:1.08rem;line-height:1.6;color:var(--muted);max-width:650px;margin:0 0 24px}
    .eyebrow{
      display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);background:rgba(255,255,255,.8);
      padding:8px 12px;border-radius:999px;font-size:.82rem;font-weight:800;color:var(--primary-dark)
    }
    .hero-actions{display:flex;flex-wrap:wrap;gap:12px}
    .btn{
      border:0;border-radius:16px;min-height:48px;padding:13px 18px;font-weight:850;
      display:inline-flex;align-items:center;justify-content:center;gap:9px;transition:.2s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:var(--primary);color:white;box-shadow:0 12px 28px rgba(111,63,245,.28)}
    .btn-primary:hover{background:var(--primary-dark)}
    .btn-secondary{background:white;color:var(--text);border:1px solid var(--border)}
    .btn-success{background:var(--success);color:white}
    .btn-danger{background:var(--danger);color:white}
    .btn-ghost{background:transparent;color:var(--primary-dark)}
    .btn-block{width:100%}
    .preview-card{
      background:linear-gradient(160deg,#fff 0%,#f7f2ff 100%);border:1px solid var(--border);
      border-radius:30px;padding:22px;box-shadow:var(--shadow);position:relative;overflow:hidden;
    }
    .preview-card:after{
      content:"";position:absolute;width:170px;height:170px;border-radius:50%;background:rgba(111,63,245,.1);
      right:-60px;top:-70px
    }
    .phone{
      max-width:360px;margin:0 auto;background:#211a31;border:9px solid #211a31;border-radius:36px;
      box-shadow:0 30px 70px rgba(37,24,65,.25);overflow:hidden
    }
    .phone-screen{background:#fbfaff;min-height:590px;border-radius:26px;padding:22px}
    .mini-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px}
    .mini-logo{font-weight:950;color:var(--primary)}
    .mini-chip{font-size:.72rem;background:#ebfff5;color:#187c51;padding:7px 10px;border-radius:999px;font-weight:800}
    .mini-card{background:white;border:1px solid var(--border);border-radius:20px;padding:17px;margin-bottom:12px}
    .mini-title{font-size:1.35rem;font-weight:900;letter-spacing:-.04em;margin-bottom:6px}
    .mini-muted{color:var(--muted);font-size:.82rem}
    .mini-row{display:flex;gap:8px;margin-top:14px}
    .mini-pill{flex:1;padding:10px 6px;border-radius:12px;text-align:center;font-size:.72rem;font-weight:900}
    .mini-pill.success{background:#e7f9f0;color:#19784e}
    .mini-pill.warning{background:#fff3df;color:#9a5a11}
    .feature-grid{display:grid;gap:14px;margin-top:36px}
    .feature{
      padding:18px;background:rgba(255,255,255,.75);border:1px solid var(--border);border-radius:20px
    }
    .feature strong{display:block;margin-bottom:6px}
    .feature span{color:var(--muted);font-size:.92rem;line-height:1.45}
    .page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:22px}
    .page-header h1,.page-header h2{margin:0 0 6px;letter-spacing:-.045em}
    .page-header p{margin:0;color:var(--muted)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:0 12px 35px rgba(55,36,96,.07)}
    .stack{display:grid;gap:16px}
    .grid{display:grid;gap:16px}
    .form-group{display:grid;gap:8px}
    label{font-weight:800;font-size:.92rem}
    .hint{color:var(--muted);font-size:.82rem}
    input,textarea{
      width:100%;border:1px solid var(--border);background:#fdfcff;border-radius:14px;min-height:48px;
      padding:12px 14px;color:var(--text);outline:none;transition:.2s
    }
    input:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(111,63,245,.1)}
    textarea{min-height:96px;resize:vertical}
    .date-row{display:grid;grid-template-columns:1fr auto;gap:10px}
    .icon-btn{
      width:48px;height:48px;border-radius:14px;border:1px solid var(--border);background:white;color:var(--danger);font-size:1.2rem
    }
    .separator{height:1px;background:var(--border);margin:2px 0}
    .notice{padding:14px 16px;border-radius:16px;background:#f3efff;border:1px solid #dfd4ff;color:#5532a8;font-size:.9rem}
    .event-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}
    .event-head h1{font-size:clamp(2rem,7vw,3.5rem);letter-spacing:-.055em;margin:0 0 10px}
    .meta{display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:.9rem}
    .meta span{background:#f7f4fb;padding:8px 10px;border-radius:999px}
    .status{padding:9px 12px;border-radius:999px;font-size:.78rem;font-weight:900;white-space:nowrap}
    .status.waiting{background:#fff4df;color:#9c5a0e}
    .status.ready{background:#eee8ff;color:#582bbd}
    .status.confirmed{background:#e5f9ef;color:#19784e}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}
    .stat{padding:16px;background:#faf8ff;border:1px solid var(--border);border-radius:18px}
    .stat b{display:block;font-size:1.7rem;letter-spacing:-.04em}
    .stat span{color:var(--muted);font-size:.8rem}
    .slot-card{
      border:1px solid var(--border);border-radius:20px;padding:16px;background:white;display:grid;gap:14px;
      transition:.2s
    }
    .slot-card.best{border:2px solid var(--primary);box-shadow:0 12px 30px rgba(111,63,245,.13)}
    .slot-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .slot-title{font-weight:900}
    .best-label{font-size:.72rem;font-weight:900;color:white;background:var(--primary);padding:6px 9px;border-radius:999px}
    .bar{height:9px;border-radius:999px;background:#ece7f4;overflow:hidden}
    .bar-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--primary),#9f7cff)}
    .counts{display:flex;gap:8px;flex-wrap:wrap}
    .count{font-size:.78rem;font-weight:800;padding:7px 9px;border-radius:999px}
    .count.yes{background:#e8f9f0;color:#19784e}
    .count.maybe{background:#fff3df;color:#9a5a11}
    .count.no{background:#fdecef;color:#a33f4a}
    .participant-list{display:grid;gap:10px}
    .participant{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
    .participant:last-child{border-bottom:0}
    .avatar{width:38px;height:38px;border-radius:13px;background:#eee7ff;color:var(--primary-dark);display:grid;place-items:center;font-weight:900}
    .participant-main{display:flex;align-items:center;gap:11px}
    .response-grid{display:grid;gap:12px}
    .availability{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .availability input{display:none}
    .choice{
      min-height:54px;border:1px solid var(--border);border-radius:14px;background:white;
      display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;
      font-weight:850;font-size:.83rem;transition:.2s
    }
    .availability input:checked + .choice.yes{background:#e5f9ef;border-color:var(--success);color:#19784e}
    .availability input:checked + .choice.maybe{background:#fff1d9;border-color:var(--warning);color:#9a5a11}
    .availability input:checked + .choice.no{background:#fde9ec;border-color:var(--danger);color:#a33f4a}
    .public-hero{padding:24px 0}
    .public-icon{width:70px;height:70px;border-radius:22px;background:linear-gradient(145deg,var(--primary),#9d79ff);display:grid;place-items:center;font-size:2rem;margin-bottom:18px}
    .public-hero h1{font-size:clamp(2.2rem,10vw,4.2rem);letter-spacing:-.06em;line-height:1;margin:0 0 12px}
    .public-hero p{color:var(--muted);line-height:1.6}
    .success-view{text-align:center;padding:42px 0}
    .success-icon{width:84px;height:84px;border-radius:28px;background:#e5f9ef;color:var(--success);display:grid;place-items:center;font-size:2.4rem;margin:0 auto 18px}
    .success-view h1{font-size:clamp(2rem,8vw,3.4rem);letter-spacing:-.05em}
    .linkbox{display:flex;gap:8px;background:#faf8ff;border:1px solid var(--border);padding:8px;border-radius:16px}
    .linkbox input{border:0;background:transparent;min-height:42px}
    .map-builder{padding:18px;border:1px solid var(--border);border-radius:20px;background:#faf8ff;display:grid;gap:14px}
    .map-builder summary{cursor:pointer;font-weight:850;color:var(--primary-dark)}
    .map-builder details{color:var(--muted);font-size:.86rem;line-height:1.55}
    .map-actions{display:flex;gap:10px;flex-wrap:wrap}
    .map-error{padding:14px 16px;border-radius:14px;background:#fdecef;color:#9f3745;border:1px solid #f5c7ce;font-size:.86rem;font-weight:750}
    .map-loading{padding:18px;border:1px solid var(--border);border-radius:18px;background:white;display:flex;align-items:center;gap:12px;color:var(--muted);font-weight:750}
    .spinner{width:20px;height:20px;border:3px solid #e8e0fa;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .place-preview{overflow:hidden;border:1px solid var(--border);border-radius:22px;background:white;box-shadow:0 12px 32px rgba(55,36,96,.08)}
    .place-photo{height:210px;background-size:cover;background-position:center;position:relative}
    .place-photo:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(22,15,38,.52))}
    .place-source{position:absolute;left:14px;bottom:12px;z-index:2;color:white;background:rgba(32,27,44,.72);backdrop-filter:blur(8px);padding:7px 10px;border-radius:999px;font-size:.72rem;font-weight:850}
    .place-body{padding:18px;display:grid;gap:12px}
    .place-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
    .place-head h2,.place-head h3{margin:0 0 5px;letter-spacing:-.035em}
    .place-address{margin:0;color:var(--muted);line-height:1.45}
    .place-meta{display:flex;gap:8px;flex-wrap:wrap}
    .place-chip{padding:7px 9px;border-radius:999px;background:#f5f1ff;color:#5935ad;font-size:.76rem;font-weight:850}
    .rating{white-space:nowrap;font-weight:900;color:#7a4a00;background:#fff3d8;padding:8px 10px;border-radius:12px}
    .location-card{padding:0;overflow:hidden}
    .location-card .place-preview{border:0;border-radius:0;box-shadow:none}
    .manual-fields{display:grid;gap:12px;margin-top:12px}
    .toast{
      position:fixed;bottom:20px;left:50%;transform:translate(-50%,20px);opacity:0;
      background:#201b2c;color:white;padding:12px 16px;border-radius:14px;font-weight:800;z-index:50;transition:.25s;
      box-shadow:0 14px 40px rgba(0,0,0,.25)
    }
    .toast.show{opacity:1;transform:translate(-50%,0)}
    .bottom-actions{
      position:sticky;bottom:12px;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);
      border:1px solid var(--border);padding:10px;border-radius:20px;display:flex;gap:10px;box-shadow:var(--shadow);margin-top:20px
    }
    .bottom-actions .btn{flex:1}
    .prototype-note{
      margin-top:26px;padding:14px 16px;border:1px dashed #cdbdf6;border-radius:16px;color:#6549a5;background:rgba(255,255,255,.65);font-size:.86rem
    }
    dialog{
      width:min(430px,calc(100% - 28px));border:0;border-radius:24px;padding:0;box-shadow:0 30px 100px rgba(35,20,70,.35)
    }
    dialog::backdrop{background:rgba(22,15,38,.55);backdrop-filter:blur(4px)}
    .dialog-body{padding:24px}
    .dialog-actions{display:flex;gap:10px;margin-top:20px}
    .dialog-actions .btn{flex:1}

    .dashboard-hero{
      display:flex;align-items:flex-start;justify-content:space-between;gap:20px;
      margin-bottom:22px;padding:8px 0 4px
    }
    .dashboard-hero h1{
      margin:12px 0 8px;font-size:clamp(2.25rem,7vw,4rem);line-height:1;
      letter-spacing:-.06em
    }
    .dashboard-hero p{margin:0;color:var(--muted);font-size:1rem;line-height:1.55}
    .dashboard-summary{
      display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:34px
    }
    .summary-card{
      background:rgba(255,255,255,.82);border:1px solid var(--border);border-radius:20px;
      padding:18px;box-shadow:0 10px 28px rgba(55,36,96,.06)
    }
    .summary-card b{display:block;font-size:1.9rem;letter-spacing:-.05em;margin-bottom:3px}
    .summary-card span{font-size:.82rem;color:var(--muted)}
    .dashboard-section{margin-top:34px}
    .dashboard-section-head{
      display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:15px
    }
    .dashboard-section-head h2{margin:0 0 5px;font-size:1.45rem;letter-spacing:-.04em}
    .dashboard-section-head p{margin:0;color:var(--muted);font-size:.9rem}
    .dashboard-event-list{display:grid;gap:13px}
    .dashboard-event{
      display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:15px;
      padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:22px;
      box-shadow:0 10px 30px rgba(55,36,96,.06);transition:.2s
    }
    .dashboard-event:hover{transform:translateY(-1px);box-shadow:0 16px 34px rgba(55,36,96,.1)}
    .event-date-box{
      width:64px;min-height:66px;border-radius:18px;background:var(--surface-2);
      display:grid;place-items:center;text-align:center;padding:8px
    }
    .event-date-box .month{font-size:.68rem;text-transform:uppercase;font-weight:900;color:var(--primary)}
    .event-date-box .day{font-size:1.6rem;line-height:1;font-weight:950;letter-spacing:-.06em}
    .event-date-box.pending{background:#fff4df}
    .event-date-box.pending .month{color:#9c5a0e}
    .dashboard-event-main{min-width:0}
    .dashboard-event-title{
      display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px
    }
    .dashboard-event-title h3{
      margin:0;font-size:1.04rem;letter-spacing:-.025em;white-space:nowrap;
      overflow:hidden;text-overflow:ellipsis;max-width:100%
    }
    .dashboard-event-meta{display:flex;flex-wrap:wrap;gap:7px;color:var(--muted);font-size:.8rem}
    .dashboard-event-meta span{display:inline-flex;align-items:center;gap:4px}
    .dashboard-event-actions{display:flex;align-items:center;gap:8px}
    .dashboard-event-actions .btn{min-height:42px;padding:10px 13px;border-radius:14px;font-size:.82rem}
    .mini-status{
      display:inline-flex;padding:5px 8px;border-radius:999px;font-size:.69rem;font-weight:900
    }
    .mini-status.ready{background:#eee8ff;color:#582bbd}
    .mini-status.waiting{background:#fff4df;color:#9c5a0e}
    .mini-status.confirmed{background:#e5f9ef;color:#19784e}
    .empty-dashboard{
      background:rgba(255,255,255,.7);border:1px dashed #cdbdf6;border-radius:22px;
      padding:28px;text-align:center;color:var(--muted)
    }
    .calendar-all{white-space:nowrap}

    @media(min-width:760px){
      main{padding-top:48px}
      .hero-grid{grid-template-columns:1.1fr .9fr;align-items:center}
      .feature-grid{grid-template-columns:repeat(3,1fr)}
      .grid-2{grid-template-columns:1fr 1fr}
      .dashboard-grid{grid-template-columns:1.15fr .85fr;align-items:start}
      .response-grid{grid-template-columns:repeat(2,1fr)}
      .card{padding:24px}
    }
    @media(max-width:520px){
      .demo-badge{display:none}
      .dashboard-hero{display:grid}
      .dashboard-hero .btn{width:100%}
      .dashboard-summary{grid-template-columns:1fr 1fr}
      .summary-card:last-child{grid-column:1/-1}
      .dashboard-section-head{align-items:flex-start;display:grid}
      .calendar-all{width:100%}
      .dashboard-event{grid-template-columns:auto minmax(0,1fr)}
      .dashboard-event-actions{grid-column:1/-1}
      .dashboard-event-actions .btn{flex:1}
      .event-date-box{width:58px;min-height:62px}
      .stats{grid-template-columns:1fr 1fr}
      .stat:last-child{grid-column:1/-1}
      .event-head{display:grid}
      .availability{grid-template-columns:1fr}
      .choice{justify-content:flex-start;padding-left:14px}
      .bottom-actions{flex-direction:column}
      .location-info{display:grid}
      .place-photo{height:180px}
      .place-head{display:grid}
    }
  </style>
</head>
<body>
<div id="app" class="app"></div>
<div id="toast" class="toast">Copié</div>

<dialog id="confirmDialog">
  <div class="dialog-body">
    <div class="eyebrow">Décision finale</div>
    <h2 style="margin:14px 0 8px;letter-spacing:-.04em">Confirmer cette date ?</h2>
    <p id="confirmText" style="color:var(--muted);line-height:1.55"></p>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeDialog()">Annuler</button>
      <button class="btn btn-primary" onclick="confirmSelectedSlot()">Confirmer</button>
    </div>
  </div>
</dialog>

<script>
const demoEvent = {
  id: "demo-001",
  organizer: "Nicolas",
  title: "Anniversaire de Sarah",
  description: "On arrête d’en parler pendant trois semaines et on choisit enfin une date.",
  location: "Joya",
  locationName: "Joya",
  locationAddress: "47 Rue Saint-Charles, 75015 Paris",
  mapsShareUrl: "https://maps.app.goo.gl/oQ6p7LHfG8MP3Vev9",
  placePreview: {
    name: "Joya",
    address: "47 Rue Saint-Charles, 75015 Paris",
    category: "Restaurant",
    rating: "4,7",
    reviewCount: "349 avis",
    resolved: true,
    photoUrl: "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1200&q=82"
  },
  budget: "30 €",
  status: "ready",
  confirmedSlot: null,
  slots: [
    { id:"s1", date:"2026-08-14", label:"Vendredi 14 août", time:"20:00" },
    { id:"s2", date:"2026-08-15", label:"Samedi 15 août", time:"20:00" },
    { id:"s3", date:"2026-08-22", label:"Samedi 22 août", time:"19:30" }
  ],
  participants: [
    {name:"Sarah", answers:{s1:"yes",s2:"yes",s3:"maybe"}},
    {name:"Alex", answers:{s1:"no",s2:"yes",s3:"yes"}},
    {name:"Maya", answers:{s1:"maybe",s2:"yes",s3:"no"}},
    {name:"Yanis", answers:{s1:"yes",s2:"maybe",s3:"yes"}},
    {name:"Inès", answers:{s1:"no",s2:"yes",s3:"maybe"}}
  ]
};

let state = {
  event: JSON.parse(localStorage.getItem("bima_event_v4") || "null") || demoEvent,
  participantName: "",
  participantAnswers: {},
  selectedSlot: null
};

function isGoogleMapsShareUrl(value=""){
  try{
    const url=new URL(String(value||"").trim());
    const host=url.hostname.toLowerCase();
    return url.protocol==="https:" && (
      host==="maps.app.goo.gl" || host==="goo.gl" ||
      host==="www.google.com" || host.startsWith("maps.google.") ||
      host.startsWith("www.google.")

function previewPlaceInput(){
  const input=document.getElementById("mapsShareUrl");
  const output=document.getElementById("placePreview");
  if(!input || !output) return;
  const raw=input.value.trim();
  if(!raw){ input.setCustomValidity(""); output.innerHTML=""; return; }
  if(!isGoogleMapsShareUrl(raw)){
    input.setCustomValidity("Colle un lien de partage Google Maps valide.");
    output.innerHTML='<div class="map-error">Ce lien ne ressemble pas à un lien Google Maps. Utilise Partager → Copier le lien.</div>';
    return;
  }
  input.setCustomValidity("");
  output.innerHTML='<div class="map-loading"><span class="spinner"></span> BIMA récupère les informations du lieu…</div>';
  const manualName=document.getElementById("locationName")?.value.trim()||"";
  const manualAddress=document.getElementById("locationAddress")?.value.trim()||"";
  setTimeout(()=>{
    const place=demoResolvePlace(raw,manualName,manualAddress);
    output.innerHTML=renderPlacePreview(place,raw);
    output.dataset.preview=encodeURIComponent(JSON.stringify(place));
  },650);
}

function createEvent(e){
  e.preventDefault();
  const fd=new FormData(e.target);
  const dates=fd.getAll("date"), times=fd.getAll("time");
  const mapsShareUrl=String(fd.get("mapsShareUrl")||"").trim();
  if(mapsShareUrl && !isGoogleMapsShareUrl(mapsShareUrl)){
    const field=document.getElementById("mapsShareUrl");
    field?.setCustomValidity("Colle un lien de partage Google Maps valide.");
    field?.reportValidity();
    field?.focus();
    return;
  }
  const locationName=String(fd.get("locationName")||"").trim();
  const locationAddress=String(fd.get("locationAddress")||"").trim();
  let placePreview=null;
  const previewData=document.getElementById("placePreview")?.dataset.preview;
  if(previewData){
    try{ placePreview=JSON.parse(decodeURIComponent(previewData)); }catch(error){}
  }
  if(mapsShareUrl && !placePreview) placePreview=demoResolvePlace(mapsShareUrl,locationName,locationAddress);
  if(placePreview){
    if(locationName) placePreview.name=locationName;
    if(locationAddress) placePreview.address=locationAddress;
  }
  state.event={
    id:"evt-"+Date.now(), organizer:fd.get("organizer"), title:fd.get("title"),
    description:fd.get("description"),
    location:(locationName||placePreview?.name||locationAddress||placePreview?.address||""),
    locationName:(locationName||placePreview?.name||""),
    locationAddress:(locationAddress||placePreview?.address||""),
    mapsShareUrl, placePreview, budget:fd.get("budget"), status:"waiting", confirmedSlot:null,
    slots:dates.map((d,i)=>({id:"s"+(i+1),...formatDate(d,times[i])})), participants:[]
  };
  save(); toast("Sortie créée"); go("/organizer");
}
function organizerPage(){
  const [statusClass,statusText]=statusLabel();
  const best=bestSlot();
  const maxScore=Math.max(...state.event.slots.map(s=>score(s.id)),1);
  return `
    <div class="event-head">
      <div>
        <span class="eyebrow">Espace organisateur</span>
        <h1>${esc(state.event.title)}</h1>
        <div class="meta"><span>👤 ${esc(state.event.organizer)}</span>${locationLabel()?`<span>📍 ${esc(locationLabel())}</span>`:""}${state.event.budget?`<span>💸 ${esc(state.event.budget)}</span>`:""}</div>
      </div>
      <span class="status ${statusClass}">${statusText}</span>
    </div>
    <div class="stats">
      <div class="stat"><b>${state.event.participants.length}</b><span>participant${state.event.participants.length!==1?"s":""}</span></div>
      <div class="stat"><b>${state.event.slots.length}</b><span>dates proposées</span></div>
      <div class="stat"><b>${best?score(best.id):0}</b><span>score du meilleur créneau</span></div>
    </div>
    <div class="grid dashboard-grid">
      <section class="card stack">
        <div class="page-header"><div><h2>Créneaux proposés</h2><p>Disponible = 2 points, Peut-être = 1.</p></div></div>
        ${state.event.slots.map(s=>{
          const c=counts(s.id), isBest=best&&best.id===s.id;
          return `<article class="slot-card ${isBest?"best":""}">
            <div class="slot-top">
              <div><div class="slot-title">${esc(s.label)} · ${esc(s.time)}</div><div class="hint">Score : ${score(s.id)} points</div></div>
              ${isBest?`<span class="best-label">Meilleur créneau</span>`:""}
            </div>
            <div class="bar"><div class="bar-fill" style="width:${(score(s.id)/maxScore)*100}%"></div></div>
            <div class="counts"><span class="count yes">${c.yes} dispo</span><span class="count maybe">${c.maybe} peut-être</span><span class="count no">${c.no} indispo</span></div>
            <button class="btn ${isBest?"btn-primary":"btn-secondary"} btn-block" onclick="openConfirm('${s.id}')">Confirmer cette date</button>
          </article>`;
        }).join("")}
      </section>
      <aside class="stack">
        <section class="card stack">
          <div><h2 style="margin:0 0 6px">Partager la sortie</h2><p class="hint">Le lien public permet au groupe de répondre sans compte.</p></div>
          <div class="linkbox"><input readonly value="${location.href.split("#")[0]}#/event"><button class="btn btn-secondary" onclick="copyPublicLink()">Copier</button></div>
          <button class="btn btn-success btn-block" onclick="shareWhatsApp()">Partager sur WhatsApp</button>
          <button class="btn btn-secondary btn-block" onclick="go('/event')">Ouvrir la vue participant</button>
        </section>
        ${locationCard()}
        <section class="card">
          <div class="page-header"><div><h2>Participants</h2><p>${state.event.participants.length} réponse${state.event.participants.length!==1?"s":""}</p></div></div>
          <div class="participant-list">
            ${state.event.participants.length?state.event.participants.map(p=>`<div class="participant"><div class="participant-main"><span class="avatar">${esc(p.name[0]||"?")}</span><strong>${esc(p.name)}</strong></div><span class="hint">${Object.values(p.answers).filter(v=>v==="yes").length} dispo</span></div>`).join(""):`<div class="notice">Aucune réponse pour le moment. Le groupe contemple probablement le lien sans cliquer.</div>`}
          </div>
        </section>
      </aside>
    </div>
    <div class="bottom-actions">
      <button class="btn btn-secondary" onclick="go('/')">Retour au dashboard</button>
      <button class="btn btn-primary" onclick="go('/create')">Créer une autre sortie</button>
    </div>`;
}
function copyPublicLink(){
  navigator.clipboard?.writeText(location.href.split("#")[0]+"#/event"); toast("Lien public copié");
}
function shareWhatsApp(){
  const url=location.href.split("#")[0]+"#/event";
  const msg=`On essaie enfin d’organiser ${state.event.title} 😅\nIndique tes disponibilités ici :\n${url}`;
  window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");
}
function openConfirm(id){
  state.selectedSlot=id;
  const s=state.event.slots.find(x=>x.id===id);
  document.getElementById("confirmText").textContent=`La sortie sera confirmée le ${s.label.toLowerCase()} à ${s.time}. Les autres dates ne seront plus proposées.`;
  document.getElementById("confirmDialog").showModal();
}
function closeDialog(){document.getElementById("confirmDialog").close()}
function confirmSelectedSlot(){
  state.event.confirmedSlot=state.selectedSlot; state.event.status="confirmed"; save(); closeDialog(); go("/confirmed");
}
function participantPage(){
  if(state.event.confirmedSlot) return confirmedPage(true);
  return `
    <section class="public-hero">
      <div class="public-icon">🎉</div>
      <span class="eyebrow">Sortie proposée par ${esc(state.event.organizer)}</span>
      <h1>${esc(state.event.title)}</h1>
      <p>${esc(state.event.description||"Choisis tes disponibilités pour aider le groupe à arrêter de répondre « comme vous voulez ».")}</p>
      <div class="meta">${locationLabel()?`<span>📍 ${esc(locationLabel())}</span>`:""}${state.event.budget?`<span>💸 ${esc(state.event.budget)}</span>`:""}<span>👥 ${state.event.participants.length} réponse${state.event.participants.length!==1?"s":""}</span></div>
    </section>
    ${locationCard()}
    <form class="card stack" style="margin-top:16px" onsubmit="submitResponse(event)">
      <div class="form-group">
        <label for="participantName">Ton prénom *</label>
        <input id="participantName" name="participantName" required placeholder="Alex" value="${esc(state.participantName)}">
      </div>
      <div class="separator"></div>
      <div>
        <h2 style="margin:0 0 6px">Tes disponibilités</h2>
        <p class="hint">Choisis une réponse pour chaque date.</p>
      </div>
      <div class="response-grid">
        ${state.event.slots.map(s=>`
          <section class="slot-card">
            <div><div class="slot-title">${esc(s.label)}</div><div class="hint">${esc(s.time)}</div></div>
            <div class="availability">
              <label><input type="radio" name="${s.id}" value="yes" required><span class="choice yes">✓ Disponible</span></label>
              <label><input type="radio" name="${s.id}" value="maybe"><span class="choice maybe">~ Peut-être</span></label>
              <label><input type="radio" name="${s.id}" value="no"><span class="choice no">× Indisponible</span></label>
            </div>
          </section>`).join("")}
      </div>
      <button class="btn btn-primary btn-block" type="submit">Envoyer ma réponse</button>
    </form>
    <div class="prototype-note">Aucun compte n’est demandé. Dans la vraie version, un lien personnel permettra de modifier la réponse.</div>`;
}
function submitResponse(e){
  e.preventDefault();
  const fd=new FormData(e.target);
  const name=String(fd.get("participantName")).trim();
  const answers={}; state.event.slots.forEach(s=>answers[s.id]=fd.get(s.id));
  const existing=state.event.participants.find(p=>p.name.toLowerCase()===name.toLowerCase());
  if(existing) existing.answers=answers; else state.event.participants.push({name,answers});
  state.participantName=name; state.participantAnswers=answers;
  save(); go("/thanks");
}
function thanksPage(){
  const best=bestSlot();
  return `
    <section class="success-view">
      <div class="success-icon">✓</div>
      <span class="eyebrow">Réponse enregistrée</span>
      <h1>C’est noté, ${esc(state.participantName||"merci")}.</h1>
      <p style="color:var(--muted);max-width:550px;margin:0 auto 26px;line-height:1.6">Le meilleur créneau actuel est <strong>${best?esc(best.label)+" à "+esc(best.time):"encore indécis"}</strong>. L’organisateur peut maintenant faire ce geste rare et courageux : prendre une décision.</p>
      <div class="hero-actions" style="justify-content:center">
        <button class="btn btn-secondary" onclick="go('/event')">Modifier ma réponse</button>
        <button class="btn btn-primary" onclick="go('/organizer')">Voir le suivi organisateur</button>
      </div>
    </section>`;
}
function confirmedPage(publicView=false){
  const s=state.event.slots.find(x=>x.id===state.event.confirmedSlot) || bestSlot();
  const available=state.event.participants.filter(p=>p.answers[s.id]==="yes").map(p=>p.name);
  return `
    <section class="success-view">
      <div class="success-icon">📅</div>
      <span class="eyebrow">Sortie confirmée</span>
      <h1>${esc(state.event.title)}</h1>
      <div class="card" style="max-width:620px;margin:24px auto;text-align:left">
        <div class="grid grid-2">
          <div><span class="hint">Date</span><h2 style="margin:5px 0">${esc(s.label)}</h2></div>
          <div><span class="hint">Heure</span><h2 style="margin:5px 0">${esc(s.time)}</h2></div>
        </div>
        ${locationLabel()?`<div class="separator" style="margin:18px 0"></div><span class="hint">Lieu</span><h3 style="margin:5px 0">${esc(locationLabel())}</h3>${state.event.locationAddress?`<p style="margin:4px 0;color:var(--muted)">${esc(state.event.locationAddress)}</p>`:""}`:""}
        <div class="separator" style="margin:18px 0"></div>
        <span class="hint">Participants disponibles</span>
        <p style="font-weight:800">${available.length?available.map(esc).join(", "):"Aucun participant disponible pour le moment"}</p>
      </div>
      <div style="max-width:620px;margin:0 auto 24px;text-align:left">${state.event.placePreview?renderPlacePreview(state.event.placePreview,state.event.mapsShareUrl):""}</div>
      <div class="hero-actions" style="justify-content:center">
        <button class="btn btn-primary" onclick="downloadICS()">Ajouter au calendrier</button>
        ${locationQuery()?`<button class="btn btn-secondary" onclick="openMaps()">Ouvrir dans Google Maps</button>`:""}
        <button class="btn btn-ghost" onclick="go('${publicView?"/event":"/"}')">${publicView?"Actualiser":"Retour au dashboard"}</button>
      </div>
    </section>`;
}
function escapeICS(value=""){
  return String(value).replace(/\\/g,"\\\\").replace(/\n/g,"\\n").replace(/,/g,"\\,").replace(/;/g,"\\;");
}
function eventDateRange(event){
  const s=eventSlot(event);
  const start=s?.date ? new Date(s.date+"T"+(s.time||"20:00")) : new Date();
  if(!s?.date) start.setDate(start.getDate()+7);
  const end=new Date(start.getTime()+2*60*60*1000);
  return {slot:s,start,end};
}
function formatICSDate(date){ return date.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z"; }
function eventToICS(event){
  const {start,end}=eventDateRange(event);
  return `BEGIN:VEVENT
UID:${escapeICS(event.id)}@bima
DTSTAMP:${formatICSDate(new Date())}
DTSTART:${formatICSDate(start)}
DTEND:${formatICSDate(end)}
SUMMARY:${escapeICS(event.title)}
LOCATION:${escapeICS([event.locationName,event.locationAddress].filter(Boolean).join(", "))}
DESCRIPTION:${escapeICS(event.description||"")}
URL:${escapeICS(event.mapsShareUrl||"")}
END:VEVENT`;
}
function downloadCalendarFile(content,filename){
  const blob=new Blob([content.replace(/\n/g,"\r\n")],{type:"text/calendar;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
function downloadICS(){
  const content=`BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//BIMA//FR
CALSCALE:GREGORIAN
${eventToICS(state.event)}
END:VCALENDAR`;
  downloadCalendarFile(content,"sortie-bima.ics");
  toast("Sortie ajoutée au calendrier");
}
function downloadICSForEvent(id){
  const event=state.events.find(item=>item.id===id);
  if(!event||!event.confirmedSlot) return;
  const content=`BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//BIMA//FR
CALSCALE:GREGORIAN
${eventToICS(event)}
END:VCALENDAR`;
  const safeName=event.title.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||"sortie";
  downloadCalendarFile(content,`${safeName}.ics`);
  toast("Sortie ajoutée au calendrier");
}
function downloadAllConfirmedICS(){
  const events=state.events.filter(event=>event.confirmedSlot);
  if(!events.length){toast("Aucune sortie confirmée");return;}
  const content=`BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//BIMA//FR
CALSCALE:GREGORIAN
X-WR-CALNAME:Mes sorties BIMA
${events.map(eventToICS).join("\n")}
END:VCALENDAR`;
  downloadCalendarFile(content,"mes-prochaines-sorties-bima.ics");
  toast(`${events.length} sorties ajoutées au calendrier`);
}
function openMapUrl(encoded){try{const url=decodeURIComponent(encoded);if(isGoogleMapsShareUrl(url)) window.open(url,"_blank")}catch(error){}}
function openMaps(){if(state.event.mapsShareUrl){window.open(state.event.mapsShareUrl,"_blank");return;}const query=locationQuery();if(query) window.open("https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(query),"_blank")}
function resetDemo(){
  state.events=defaultDashboardEvents();
  state.event=cloneEvent(state.events[0]);
  state.participantName="";
  state.participantAnswers={};
  localStorage.setItem("bima_event_v4",JSON.stringify(state.event));
  localStorage.setItem("bima_events_v4",JSON.stringify(state.events));
  toast("Démo réinitialisée");
  go("/");
  render();
}
window.addEventListener("hashchange",render);
render();
</script>
